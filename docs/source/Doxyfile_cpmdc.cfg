DOXYFILE_ENCODING      = UTF-8
PROJECT_NAME           = "cpmdc"
PROJECT_NUMBER         = "0.1.0"
PROJECT_BRIEF          = "C ABI for embedding OpenCPMD with Cap'n Proto parameters"
OUTPUT_DIRECTORY       = "."

INPUT                  = "../../include"
FILE_PATTERNS          = *.h \
                         *.c \
                         *.f90
RECURSIVE              = YES
EXCLUDE_PATTERNS       = */tests/* \
                         */subprojects/*

GENERATE_XML           = YES
XML_PROGRAMLISTING     = NO
GENERATE_HTML          = NO
GENERATE_LATEX         = NO

OPTIMIZE_OUTPUT_FOR_C  = YES
EXTRACT_ALL            = NO
JAVADOC_AUTOBRIEF      = YES
MARKDOWN_SUPPORT       = YES
CASE_SENSE_NAMES       = NO
